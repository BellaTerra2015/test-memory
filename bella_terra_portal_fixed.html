<!DOCTYPE html>
<html>
<head>
  <title>Bella Terra Employee Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div id="login-screen">
  <h2>Employee Login</h2>
  <input id="login-name" placeholder="Enter your name">
  <input id="login-pass" type="password" placeholder="Password">
  <button onclick="doLogin()">Login</button>
  <p id="login-error" style="color:red;display:none;"></p>
</div>

<div id="portal" style="display:none;">
  <h2>Welcome, <span id="welcome-name"></span></h2>
  <button onclick="doLogout()">Logout</button>

  <h3>Handbook</h3>
  <button onclick="saveSignature()">Sign Handbook</button>
  <p id="status"></p>
</div>

<script>
const PORTAL_PW = "bella123";

var currentEmployee = "";

function doLogin(){
  var name = document.getElementById('login-name').value.trim();
  var pass = document.getElementById('login-pass').value;

  if(!name){
    showError("Please enter your name.");
    return;
  }

  if(pass !== PORTAL_PW){
    showError("Incorrect password.");
    return;
  }

  currentEmployee = name;

  // SAVE LOGIN
  localStorage.setItem("employeeName", name);

  document.getElementById('login-screen').style.display = "none";
  document.getElementById('portal').style.display = "block";
  document.getElementById('welcome-name').textContent = name;

  // LOAD SIGNATURE
  var signed = localStorage.getItem("signed_"+name);
  if(signed){
    document.getElementById('status').textContent = "✅ Already signed";
  }
}

function doLogout(){
  localStorage.removeItem("employeeName");
  location.reload();
}

function saveSignature(){
  localStorage.setItem("signed_"+currentEmployee, "yes");
  document.getElementById('status').textContent = "✅ Signed!";
}

function showError(msg){
  var err = document.getElementById('login-error');
  err.style.display = "block";
  err.textContent = msg;
}

// AUTO LOGIN
window.onload = function(){
  var saved = localStorage.getItem("employeeName");
  if(saved){
    document.getElementById('login-name').value = saved;
    document.getElementById('login-pass').value = PORTAL_PW;
    doLogin();
  }
}
</script>

</body>
</html>
